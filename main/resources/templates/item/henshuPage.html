<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>商品編集</title>
</head>
<body>
	<h1>商品編集</h1>
	<!--th:object="${itemForm}でFormオブジェクトと紐付け-->
	<!--th:action="@{/item/henshu/{id}商品編集ページのパスを指定-->
	<!--(id=${id})"入力された値をプレースホルダに代入-->
	<form th:action="@{/item/henshu/{id}(id=${id})}" th:object="${itemForm}" method="post">
	    <div>
	        <label>商品名</label>
	    </div>
	    <div>
	        <input type="text" th:field="*{name}" placeholder="商品名を入力してください">
	    </div>
	    <div>
	        <label>価格</label>
	    </div>
	    <div>
	        <input type="number" th:field="*{price}" placeholder="価格を入力してください">
	    </div>
	    <div>
	        <input type="submit" name="send" value="登録する">
	    </div>
	    <div>
	        <!--一覧に戻 -->
	        <a href="/item">戻る</a>
	    </div>
	</form>
</body>
</html>
